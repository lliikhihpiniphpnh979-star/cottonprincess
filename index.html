<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MY WEB-PAGE</title>
  <style>
    label, input {
      display: block;
      margin-bottom: 8px;
    }
    button {
      margin-top: 10px;
      margin-bottom: 15px;
      padding: 5px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>считание кредитов и налогов!</h1>
  <h2>укажите месяц с начала</h2>

  <label for="months-count">срок кредита (MONTHS):</label>
  <input type="number" id="months-count"
    min="1" max="60" placeholder="0"
    oninput="if(parseInt(this.value) > 60) this.value = 60;">

  <label for="price">сумма кредита:</label>
  <input type="number" id="price" placeholder="0">

  <label for="payment">ГОДОВАЯ СТАВКА:</label>
  <input type="number" id="payment" placeholder="0">

  <button onclick="calculate()">count</button>

  <p>ИТОГ: <span id="result-total">0</span> USD</p>
  <p>переплата: <span id="result-overpayment">0</span> USD.</p>

  <script>
    function calculate() {
      const S = parseFloat(document.getElementById('price').value) || 0;
      const annualRate = parseFloat(document.getElementById('payment').value) || 0;
      const n = parseInt(document.getElementById('months-count').value) || 0;

      if (S <= 0 || annualRate <= 0 || n <= 0) {
        alert("пожалуйста заполните все поля числами больше нуля!");
        return;
      }

      const r = annualRate / 12 / 100;
      const M = S * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
      const total = M * n;
      const overpayment = total - S;

      document.getElementById('result-total').innerText = total.toFixed(2);
      document.getElementById('result-overpayment').innerText = overpayment.toFixed(2);
    }
  </script>
</body>
</html>
